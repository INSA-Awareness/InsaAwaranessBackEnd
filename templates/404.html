<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Not Found · Awareness LMS API</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0d1117;
        color: #e6edf3;
        font-family:
          "Segoe UI",
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Helvetica Neue",
          Arial,
          sans-serif;
        padding: 24px;
      }
      .card {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 12px;
        padding: 26px 28px;
        width: min(520px, 100%);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
      }
      .muted {
        color: #9da5b4;
        margin-bottom: 14px;
      }
      a {
        color: #58a6ff;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      .links {
        display: grid;
        gap: 8px;
        margin-top: 14px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>404 · Not Found</h1>
      <div class="muted">
        The resource you requested was not found on this server.
      </div>
      <div class="links">
        <a href="/">Health Landing</a>
        <a href="/api/swagger/">Swagger UI</a>
        <a href="/api/redoc/">Redoc</a>
        <a href="/admin/">Django Admin</a>
      </div>
    </div>
  </body>
</html>
