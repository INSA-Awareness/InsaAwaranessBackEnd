services:
  - type: web
    name: awareness-backend
    env: python
    plan: free
    region: oregon
    autoDeploy: true
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        sync: false # set in Render dashboard (Neon URL with sslmode=require)
      - key: SECRET_KEY
        sync: false # set in Render dashboard (strong random)
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,yourdomain.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com,https://yourdomain.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-frontend.com"
      - key: PYTHON_VERSION
        value: "3.12"
      - key: CONN_MAX_AGE
        value: "60"
